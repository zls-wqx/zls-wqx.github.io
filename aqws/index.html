<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-GORB 安全管家</title>
    <link rel="stylesheet" href="styles.css">
</head>
    <style>       
.icp-container {
            display: flex;
            align-items: center;
            justify-content: center; /* 水平居中 */
            font-size: 16px; /* 默认字体大小 */
            margin-top: 50px; /* 可以根据需要调整上下边距 */
        }
        .icp-container img {
            width: 1em; /* 图片宽度与字体大小一致 */
            height: auto;
            margin-right: 0.5em; /* 图片和文字之间的间距 */
        }
        .icp-container a {
            color: black;
            text-decoration: none;
            font-size: 1em; /* 文字大小与默认字体大小一致 */
        }
        @media (max-width: 600px) {
            .icp-container {
                font-size: 14px; /* 在小屏幕上减小字体大小 */
            }
        }
    </style>
    
<body>
    <div class="container">
        <header>
            <h1>X-GORB 安全管家</h1>
            <p>保护您的系统免受病毒和木马的侵害</p>
        </header>
        <main>
            <section class="scan-section">
                <h2>系统扫描</h2>
                <p>上传文件进行安全扫描</p>
                <div class="form-group">
                    <label for="fileInput" class="custom-file-upload">
                        选择文件
                    </label>
                    <input type="file" id="fileInput">
                    <button id="scanButton">开始扫描</button>
                </div>
                <div id="scanResult" class="hidden">
                    <h3>扫描结果</h3>
                    <p id="resultText">扫描中...</p>
                </div>
            </section>
        </main>
        <footer>
            <p>&copy; 2024 X-GORB Studio. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
    <script src="https://xgorb.cn/china.js"></script>
</body>
</html>
