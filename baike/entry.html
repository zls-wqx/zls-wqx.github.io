<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>示例词条</title>
</head>
    <style>       
.icp-container {
            display: flex;
            align-items: center;
            justify-content: center; /* 水平居中 */
            font-size: 16px; /* 默认字体大小 */
            margin-top: 50px; /* 可以根据需要调整上下边距 */
        }
        .icp-container img {
            width: 1em; /* 图片宽度与字体大小一致 */
            height: auto;
            margin-right: 0.5em; /* 图片和文字之间的间距 */
        }
        .icp-container a {
            color: black;
            text-decoration: none;
            font-size: 1em; /* 文字大小与默认字体大小一致 */
        }
        @media (max-width: 600px) {
            .icp-container {
                font-size: 14px; /* 在小屏幕上减小字体大小 */
            }
        }
    </style>
<body>
    <header>
        <h1>示例词条</h1>
        <button>编辑</button>
    </header>
    <main>
        <p>这里是词条内容...</p>
        <h3>评论区</h3>
        <textarea placeholder="发表评论..."></textarea>
        <button>提交</button>
    </main>
    <footer>
        <p>© 2024 X-GORB-Studio. 保留所有权利.</p>
    </footer>
    <script src="https://xgorb.cn/china.js"></script>
</body>
</html>
