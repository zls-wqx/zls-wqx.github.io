<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bing 每日壁纸</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .container {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 90%;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bing 每日壁纸</h1>
        <p><strong>标题:</strong> <a id="wallpaper-title" href="#" target="_blank"></a></p>
            <p>网上有害信息举报专区：亲爱的市民朋友，警方反诈劝阻电话“96110”系专门针对避免您财产被骗受损而设，请您一旦收到来电，立即接听。<a href="http://www.sh12345.gov.cn/" target="_blank">12345政务服务便民热线 |</a>
<a href="https://bzpt.shdf.gov.cn/www/shouye/gzfw/wsjb/index.shtml" target="_blank">扫黄打非举报 |</a>
<a href="https://www.12321.cn/" target="_blank">12321网络不良与垃圾信息举报受理中心 |</a>
            <p> <a href="https://www.12377.cn/" title="网络违法犯罪举报中心" target="_blank"><img src="img/2.png"></a>
                <a href="https://cyberpolice.mps.gov.cn/" title="中央网信办信息举报中心" target="_blank"><img src="img/1.png"></a>
              <img src="https://www.gov.cn/images/20230928shilaohuaicon.jpg" alt="适用于老龄化标志">
              <img src="https://i0.hdslb.com/bfs/activity-plat/static/20210729/df3e2ff90b315fca2f8d24a29cb68a47/iUlvDrrAnu.png" alt="962110">
            </p>

    </div>

    <script>
        async function fetchWallpaper() {
            try {
                const response = await fetch('https://api.dwo.cc/api/bing?info=true');
                if (!response.ok) {
                    throw new Error('网络响应失败');
                }
                const data = await response.json();
                displayWallpaper(data);
            } catch (error) {
                console.error('获取壁纸时出错:', error);
                document.getElementById('wallpaper-title').innerText = '无法获取壁纸，请稍后再试。';
            }
        }

        function displayWallpaper(data) {
            document.body.style.backgroundImage = `url(${data.url})`;
            const titleLink = document.getElementById('wallpaper-title');
            titleLink.href = data.link;
            titleLink.innerText = data.title;
        }

        // 页面加载完成后自动获取壁纸
        window.onload = fetchWallpaper;
    </script>
    <script src="https://xgorb.cn/china.js"></script>
</body>
</html>
