    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
        }
        canvas {
            margin-top: 20px;
            border: 1px solid #ccc;
        }
        .controls {
            margin-top: 20px;
        }
        .btn {
            background-color: #004080;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #002d59;
        }
        
    </style>
    <style>       
.icp-container {
            display: flex;
            align-items: center;
            justify-content: center; /* 水平居中 */
            font-size: 16px; /* 默认字体大小 */
            margin-top: 50px; /* 可以根据需要调整上下边距 */
        }
        .icp-container img {
            width: 1em; /* 图片宽度与字体大小一致 */
            height: auto;
            margin-right: 0.5em; /* 图片和文字之间的间距 */
        }
        .icp-container a {
            color: black;
            text-decoration: none;
            font-size: 1em; /* 文字大小与默认字体大小一致 */
        }
        @media (max-width: 600px) {
            .icp-container {
                font-size: 14px; /* 在小屏幕上减小字体大小 */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>去水印工具</h1>
        <input type="file" id="upload" accept="image/*" class="btn">
        <canvas id="canvas" width="800" height="600"></canvas>
        <div class="controls">
            <button id="removeWatermark" class="btn">去除水印</button>
        </div>
    </div>
<div class="icp-container">
