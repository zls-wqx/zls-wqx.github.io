<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-GORB - 上传软件</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>上传软件</h1>
    </header>
<style>       
.icp-container {
            display: flex;
            align-items: center;
            justify-content: center; /* 水平居中 */
            font-size: 16px; /* 默认字体大小 */
            margin-top: 50px; /* 可以根据需要调整上下边距 */
        }
        .icp-container img {
            width: 1em; /* 图片宽度与字体大小一致 */
            height: auto;
            margin-right: 0.5em; /* 图片和文字之间的间距 */
        }
        .icp-container a {
            color: black;
            text-decoration: none;
            font-size: 1em; /* 文字大小与默认字体大小一致 */
        }
        @media (max-width: 600px) {
            .icp-container {
                font-size: 14px; /* 在小屏幕上减小字体大小 */
            }
        }
    </style>

    <main>
        <section id="upload">
            <h2>上传新的软件</h2>
            <form action="upload.php" method="post" enctype="multipart/form-data">
                <label for="software-name">软件名称:</label><br>
                <input type="text" id="software-name" name="software-name" required><br><br>

                <label for="software-description">软件描述:</label><br>
                <textarea id="software-description" name="software-description" rows="4" cols="50" required></textarea><br><br>

                <label for="software-file">选择软件文件:</label><br>
                <input type="file" id="software-file" name="software-file" accept=".exe,.zip,.rar,.7z,.tar" required><br><br>

                <input type="submit" value="上传">
            </form>
        </section>
    </main>

    <footer>
        <p>© 2024 X-GORB Studio. All rights reserved.</p>
        <div class="icp-container">
        <img src="https://moe.blog/content/uploadfile/Links/icp.gov.moe.png" alt="ICP图标">
        <a href="https://icp.gov.moe/?keyword=20249013" target="_blank">萌ICP备20249013号</a>	</div>
    </footer>
</body>
</html>
